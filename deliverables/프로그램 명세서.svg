<svg viewBox="0 0 760 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" role="img">
  <title>냠냠투게더 프로그램 데이터 흐름도 (처리 주체별)</title>
  <desc>stage1 votes 집계(B)에서 추천 생성(C), 후보 조회·정렬(C), stage2 최종 확정(B)까지 모듈 간 데이터 흐름과 처리 주체를 나타낸 흐름도.</desc>
  <rect x="0" y="0" width="760" height="1000" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2937">프로그램 데이터 흐름도 (처리 주체별)</text>
  <text x="380" y="55" text-anchor="middle" font-size="12" fill="#6b7280">데이터 객체(둥근 회색) ─ 처리 모듈(사각, 주체별 색) · 화살표 = 전달 데이터</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/></marker>
  </defs>

  <!-- legend -->
  <rect x="470" y="64" width="280" height="46" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="484" y="80" font-size="9.5" font-weight="700" fill="#334155">처리 주체</text>
  <rect x="484" y="88" width="11" height="11" rx="2" fill="#eff6ff" stroke="#3b82f6"/><text x="500" y="97" font-size="9" fill="#475569">C(추천)</text>
  <rect x="560" y="88" width="11" height="11" rx="2" fill="#ecfdf5" stroke="#10b981"/><text x="576" y="97" font-size="9" fill="#475569">B(세션·투표)</text>
  <rect x="660" y="88" width="11" height="11" rx="2" fill="#f1f5f9" stroke="#94a3b8"/><text x="676" y="97" font-size="9" fill="#475569">데이터</text>

  <!-- 1 votes stage1 -->
  <rect x="230" y="130" width="300" height="46" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="380" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">votes (stage1) · DB</text>
  <text x="380" y="167" text-anchor="middle" font-size="9.5" fill="#475569">drink · budget_min/max · categories(jsonb) · mood</text>
  <line x1="380" y1="176" x2="380" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 2 proc B aggregate -->
  <rect x="210" y="202" width="340" height="52" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <rect x="210" y="202" width="46" height="16" rx="8" fill="#10b981"/><text x="233" y="214" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">B</text>
  <text x="380" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">aggregation.aggregate → voteAggregation</text>
  <text x="380" y="243" text-anchor="middle" font-size="9.5" fill="#047857">buildConstraintsFromVotes() · collecting→aggregating</text>
  <line x1="380" y1="254" x2="380" y2="278" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="392" y="270" font-size="9" fill="#334155">AggregatedConstraints</text>

  <!-- 3 data AggregatedConstraints (계약) -->
  <rect x="200" y="280" width="360" height="74" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
  <text x="380" y="299" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">★ AggregatedConstraints (B→C 인터페이스 계약)</text>
  <text x="380" y="316" text-anchor="middle" font-size="9.5" fill="#334155">drink{drinker,ok,uncomfortable} · budgetMin · budgetMax</text>
  <text x="380" y="331" text-anchor="middle" font-size="9.5" fill="#334155">categories[{name,votes}] · moodDominant</text>
  <text x="380" y="346" text-anchor="middle" font-size="9" fill="#64748b">+ Station{id,lat,lng}</text>
  <line x1="380" y1="354" x2="380" y2="378" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 4 proc C recommend -->
  <rect x="150" y="380" width="460" height="150" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <rect x="150" y="380" width="46" height="16" rx="8" fill="#3b82f6"/><text x="173" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
  <text x="380" y="402" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">services.recommend(sessionId, constraints, station)</text>
  <!-- sub steps -->
  <rect x="168" y="414" width="200" height="44" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="268" y="431" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1d4ed8">googlePlaces.discoverAndFetch</text>
  <text x="268" y="447" text-anchor="middle" font-size="8.5" fill="#475569">Google Nearby(라이브) → Candidate[]</text>
  <rect x="392" y="414" width="200" height="44" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="492" y="431" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1d4ed8">fetchRegisteredCandidates</text>
  <text x="492" y="447" text-anchor="middle" font-size="8.5" fill="#475569">places(owner/community) → Candidate[]</text>
  <rect x="168" y="464" width="424" height="26" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="380" y="481" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e40af">domain.runPipeline — 필터(술·예산·반경) → 정렬(카테고리·longevity) → 압축</text>
  <rect x="168" y="494" width="424" height="26" rx="6" fill="#fff" stroke="#93c5fd"/>
  <text x="380" y="511" text-anchor="middle" font-size="9.5" fill="#334155">writeRecommendations() — recommendations 작성(멱등) · status→voting</text>
  <line x1="380" y1="530" x2="380" y2="554" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="392" y="546" font-size="9" fill="#334155">RankedCandidate[]</text>

  <!-- 5 data recommendations -->
  <rect x="230" y="556" width="300" height="46" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="380" y="576" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">recommendations · DB</text>
  <text x="380" y="593" text-anchor="middle" font-size="9.5" fill="#475569">place 참조 · rank · relaxed · *_at_agg 스냅샷</text>
  <line x1="380" y1="602" x2="380" y2="626" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 6 proc C GET/sort -->
  <rect x="180" y="628" width="400" height="56" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  <rect x="180" y="628" width="46" height="16" rx="8" fill="#3b82f6"/><text x="203" y="640" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
  <text x="380" y="652" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">routes.recommend GET + domain.applySortMode</text>
  <text x="380" y="669" text-anchor="middle" font-size="9.5" fill="#334155">정렬(리뷰/평점/랜덤) + Place Details(라이브) 합성 · 상위 3~4곳</text>
  <line x1="380" y1="684" x2="380" y2="708" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="392" y="700" font-size="9" fill="#334155">후보 카드(+Powered by Google)</text>

  <!-- 7 data 프론트 카드 -->
  <rect x="230" y="710" width="300" height="40" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="380" y="735" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">후보 카드 표시 → 프론트 (stage2 투표)</text>
  <line x1="380" y1="750" x2="380" y2="774" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="392" y="766" font-size="9" fill="#334155">votes(stage2) recommendation_id</text>

  <!-- 8 proc B finalize -->
  <rect x="200" y="776" width="360" height="56" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <rect x="200" y="776" width="46" height="16" rx="8" fill="#10b981"/><text x="223" y="788" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">B</text>
  <text x="380" y="800" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">finalVote.finalizeSession(sessionId, forceWinnerId?)</text>
  <text x="380" y="817" text-anchor="middle" font-size="9.5" fill="#047857">stage2 득표 집계 · 동점 tiedIds 위임 · optimistic lock</text>
  <line x1="380" y1="832" x2="380" y2="856" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="392" y="848" font-size="9" fill="#334155">FinalizeResult</text>

  <!-- 9 data winner -->
  <rect x="230" y="858" width="300" height="46" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="380" y="878" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">sessions.winner_recommendation_id</text>
  <text x="380" y="895" text-anchor="middle" font-size="9.5" fill="#475569">status = closed (최종 확정)</text>

  <!-- side note: 의존 방향 -->
  <rect x="28" y="556" width="120" height="120" rx="8" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="88" y="576" text-anchor="middle" font-size="9.5" font-weight="700" fill="#334155">의존 방향</text>
  <text x="88" y="596" text-anchor="middle" font-size="9" fill="#475569">routes</text>
  <text x="88" y="610" text-anchor="middle" font-size="10" fill="#94a3b8">▼</text>
  <text x="88" y="624" text-anchor="middle" font-size="9" fill="#475569">services</text>
  <text x="88" y="638" text-anchor="middle" font-size="10" fill="#94a3b8">▼</text>
  <text x="88" y="652" text-anchor="middle" font-size="9" fill="#475569">domain(순수)</text>
  <text x="88" y="670" text-anchor="middle" font-size="8" fill="#94a3b8">역참조 없음</text>
</svg>
