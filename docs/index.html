<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냠냠투게더 — 법적 고지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f8f8f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p { font-size: 14px; color: #888; margin-bottom: 32px; }
    a { display: block; padding: 16px; margin-bottom: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; text-decoration: none; transition: opacity .15s; }
    a:hover { opacity: .8; }
    .primary { background: #3182F6; color: #fff; }
    .secondary { background: #f2f4f6; color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍱 냠냠투게더</h1>
    <p>점심 뭐 먹을지 함께 결정하는 서비스</p>
    <a href="privacy.html" class="primary">개인정보처리방침</a>
    <a href="terms.html" class="secondary">서비스 이용약관</a>
  </div>
</body>
</html>
