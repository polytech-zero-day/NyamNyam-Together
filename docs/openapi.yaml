openapi: 3.0.3
info:
  title: 냠냠투게더 API — A·C 파트 (추천 서버)
  version: 0.2.0
  description: |
    이 명세는 **우리 소유 엔드포인트(추천 조회·정렬, 식당 등록)** 만 다룬다.
    인증/세션/참여/투표 엔드포인트는 공통/B파트 소유 → 여기서는 제외.
    상세는 `docs/api-spec.md`. 인증은 토스 로그인 → 서버 발급 JWT(Bearer).
servers:
  - url: http://localhost:3000
    description: 로컬 개발
tags:
  - name: 추천
  - name: 등록

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        code: { type: string, example: BAD_REQUEST }
        message: { type: string }
      required: [code, message]
    Recommendation:
      type: object
      description: 통합 후보 카드(스냅샷 + 표시 시점 라이브 합성). integration-contract.md 기준.
      properties:
        recId:
          { type: string, format: uuid, description: recommendations.id — stage2 투표용 식별자 }
        placeId: { type: string, description: 구글=google_place_id, 등록=내부 places.id }
        rank: { type: integer }
        placeType: { type: string, enum: [drink_required, compatible, general], nullable: true }
        relaxed: { type: boolean, description: 조건 완화 포함 여부 }
        source: { type: string, enum: [google, owner, community], nullable: true }
        voteCount: { type: integer, description: stage2 득표 수(표시용 — 집계 정본은 B) }
        poweredByGoogle: { type: boolean, description: true면 "Powered by Google" 표기 필수 }
        # 아래는 표시 시점 라이브 조회 합성값 (DB 저장 안 함)
        name: { type: string, nullable: true, description: 라이브(google) 또는 등록값 }
        rating: { type: number, nullable: true, description: 라이브 google rating }
        reviewCount: { type: integer, nullable: true, description: 라이브 userRatingCount }
        priceLevel: { type: integer, nullable: true }
        distanceM: { type: integer, nullable: true, description: 역 중심 기준 거리(m) }
        mapUrl: { type: string, nullable: true, description: 구글 지도 링크(표시용) }
    Place:
      type: object
      properties:
        placeId: { type: string, format: uuid }
        source: { type: string, enum: [owner, community] }
        stationId: { type: string }
        name: { type: string }
        lat: { type: number }
        lng: { type: number }
        category: { type: string, nullable: true }
        priceLevel: { type: integer, nullable: true }
        openDate: { type: string, format: date, nullable: true }

security:
  - bearerAuth: []

paths:
  /sessions/{id}/recommendations:
    get:
      tags: [추천]
      summary: 추천 후보 조회 (+ 정렬·득표수)
      description: |
        status가 voting 이상일 때 유효. 아직이면 202.
        표시용 name/rating 등은 최종 후보만 라이브 조회 후 서버가 합쳐 반환.
        구글 데이터 포함 시 "Powered by Google" 출처 표기 동반.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: sort
          in: query
          required: false
          schema: { type: string, enum: [review_count, rating, random] }
          description: 미지정 시 세션 sort_mode 사용.
      responses:
        '200':
          description: 후보 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  sortMode: { type: string, enum: [review_count, rating, random] }
                  relaxed: { type: boolean }
                  attribution: { type: string, example: Powered by Google }
                  leader:
                    type: object
                    nullable: true
                    description: 현재 최다 득표(표시용, 득표 0이면 null). 최종 확정은 B.
                    properties:
                      recId: { type: string, format: uuid }
                      voteCount: { type: integer }
                  recommendations:
                    type: array
                    items: { $ref: '#/components/schemas/Recommendation' }
        '202':
          description: 아직 집계 전
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { code: NOT_READY, message: 아직 집계 전입니다 }
        '404':
          description: 세션 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sessions/{id}/sort:
    patch:
      tags: [추천]
      summary: 후보 정렬 모드 변경 (세션 공유)
      description: 개인별 아님. voting 단계에서 허용. 후보·집계는 불변(표시 순서만).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sortMode]
              properties:
                sortMode: { type: string, enum: [review_count, rating, random] }
      responses:
        '200':
          description: 변경됨
          content:
            application/json:
              schema:
                type: object
                properties: { sortMode: { type: string } }
        '400':
          description: 잘못된 sortMode
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /places:
    post:
      tags: [등록]
      summary: 점주/시민 식당 등록 (MVP 스텁)
      description: first-party 저장. 검증·심사 로직은 추후.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, stationId, name, lat, lng]
              properties:
                source: { type: string, enum: [owner, community] }
                stationId: { type: string }
                name: { type: string }
                lat: { type: number }
                lng: { type: number }
                category: { type: string, nullable: true }
                priceLevel: { type: integer, nullable: true }
                openDate: { type: string, format: date, nullable: true }
      responses:
        '201':
          description: 등록됨
          content:
            application/json:
              schema:
                type: object
                properties: { placeId: { type: string, format: uuid } }
        '400':
          description: 필수값 누락
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      tags: [등록]
      summary: 역의 등록 식당 목록
      parameters:
        - { name: stationId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: 목록
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Place' }
